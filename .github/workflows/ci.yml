name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit and CLI tests
        run: uv run pytest tests/unit/ tests/cli/ -v
