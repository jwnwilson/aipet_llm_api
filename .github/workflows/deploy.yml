name: Build and Deploy

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# OIDC requires id-token:write; contents:read is the minimum for checkout.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: aipet-llm

jobs:
  # ── Build: push ARM64 image to ECR ────────────────────────────────────────
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Set this secret to: terraform -chdir=infra/terraform output -raw github_actions_role_arn
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          # GitHub Actions cache keeps ARM64 cross-compilation fast on subsequent runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image ref
        id: image
        run: |
          echo "image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  # ── Deploy: apply manifests via kubeconfig secret ─────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      IMAGE: ${{ needs.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Sync aipet-secrets in k8s
        run: |
          kubectl create secret generic aipet-secrets \
            --from-literal=aws-s3-bucket=${{ secrets.AWS_S3_BUCKET }} \
            --from-literal=aws-access-key-id=${{ secrets.AIPET_AWS_ACCESS_KEY_ID }} \
            --from-literal=aws-secret-access-key=${{ secrets.AIPET_AWS_SECRET_ACCESS_KEY }} \
            --from-literal=kaggle-username=${{ secrets.KAGGLE_USERNAME }} \
            --from-literal=kaggle-key=${{ secrets.KAGGLE_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Refresh ECR pull credentials in k8s
        run: |
          AWS_ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            kubectl create secret docker-registry ecr-credentials \
              --docker-server=${AWS_ACCOUNT}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com \
              --docker-username=AWS \
              --docker-password-stdin \
              --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply k8s manifests
        run: kubectl apply -f infra/k8s/

      - name: Update API image
        run: kubectl set image deployment/aipet-llm aipet-llm=$IMAGE

      - name: Update Temporal worker image
        run: kubectl set image deployment/temporal-worker temporal-worker=$IMAGE

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/aipet-llm --timeout=300s
          kubectl rollout status deployment/temporal-worker --timeout=300s

  # ── E2E: behavioural inference tests against the real model ───────────────
  e2e:
    needs: [deploy]
    # Run after a successful deploy, or standalone when manually dispatched.
    if: always() && (needs.deploy.result == 'success' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
      AWS_DEFAULT_REGION: us-east-1
      AIPET_TEST_MODEL_PATH: models/test_aipet.gguf
      MODEL_VERSION: "2026-05-14"
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra inference

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Cache llama.cpp build
        uses: actions/cache@v4
        id: cache-llama
        with:
          path: llama.cpp
          key: llama-cpp-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Install build tools
        if: steps.cache-llama.outputs.cache-hit != 'true'
        run: sudo apt-get install -y cmake build-essential

      - name: Build llama.cpp
        if: steps.cache-llama.outputs.cache-hit != 'true'
        run: make setup-llama

      - name: Cache test GGUF model
        uses: actions/cache@v4
        id: cache-model
        with:
          path: models/test_aipet.gguf
          key: model-test-${{ env.MODEL_VERSION }}-${{ runner.os }}

      - name: Download and decompress test model from S3
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: uv run python -m interactors.cli.model.download_model

      - name: Run E2E inference behaviour tests
        run: uv run pytest tests/e2e/test_inference_behaviour.py -v
        timeout-minutes: 20
