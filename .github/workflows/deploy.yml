name: Build and Deploy

on:
  push:
    branches: [main]

# OIDC requires id-token:write; contents:read is the minimum for checkout.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: aipet-llm

jobs:
  # ── Gate: tests must pass before we build ─────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit and CLI tests
        run: uv run pytest tests/unit/ tests/cli/ -v

  # ── Build: push ARM64 image to ECR ────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Set this secret to: terraform -chdir=infra/terraform output -raw github_actions_role_arn
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          # GitHub Actions cache keeps ARM64 cross-compilation fast on subsequent runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image ref
        id: image
        run: |
          echo "image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  # ── Deploy: apply manifests on the local k3s cluster ──────────────────────
  # Requires a self-hosted runner on the k3s host with kubectl configured.
  # Setup: see docs/plan.md or the CI/CD plan for runner installation steps.
  deploy:
    needs: build
    runs-on: [self-hosted, k3s]
    env:
      IMAGE: ${{ needs.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Refresh ECR pull credentials in k8s
        run: |
          AWS_ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            kubectl create secret docker-registry ecr-credentials \
              --docker-server=${AWS_ACCOUNT}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com \
              --docker-username=AWS \
              --docker-password-stdin \
              --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply k8s manifests
        run: kubectl apply -f infra/k8s/

      - name: Update API image
        run: kubectl set image deployment/aipet-llm aipet-llm=$IMAGE

      - name: Update Temporal worker image
        run: kubectl set image deployment/temporal-worker temporal-worker=$IMAGE

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/aipet-llm --timeout=300s
          kubectl rollout status deployment/temporal-worker --timeout=300s
