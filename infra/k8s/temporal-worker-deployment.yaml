apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-worker
  labels:
    app: temporal-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-worker
  template:
    metadata:
      labels:
        app: temporal-worker
    spec:
      imagePullSecrets:
        - name: ecr-credentials
      containers:
        - name: temporal-worker
          # Placeholder — overwritten by CI: kubectl set image deployment/temporal-worker temporal-worker=<ECR_URL>:<sha>
          image: <ECR_REPOSITORY_URL>:latest
          command: ["python", "-m", "interactors.temporal.worker"]
          env:
            - name: PYTHONPATH
              value: /app/src
            - name: TEMPORAL_HOST
              value: "temporal:7233"
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: aipet-secrets
                  key: aws-s3-bucket
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aipet-secrets
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aipet-secrets
                  key: aws-secret-access-key
            - name: KAGGLE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: aipet-secrets
                  key: kaggle-username
                  optional: true
            - name: KAGGLE_KEY
              valueFrom:
                secretKeyRef:
                  name: aipet-secrets
                  key: kaggle-key
                  optional: true
            - name: REMOTE_HOST
              valueFrom:
                secretKeyRef:
                  name: aipet-secrets
                  key: remote-host
                  optional: true
            - name: REMOTE_USER
              valueFrom:
                secretKeyRef:
                  name: aipet-secrets
                  key: remote-user
                  optional: true
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
