apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-worker
  labels:
    app: temporal-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-worker
  template:
    metadata:
      labels:
        app: temporal-worker
    spec:
      imagePullSecrets:
        - name: ecr-credentials
      containers:
        - name: temporal-worker
          # Placeholder — overwritten by CI: kubectl set image deployment/temporal-worker temporal-worker=<ECR_URL>:<sha>
          image: <ECR_REPOSITORY_URL>:latest
          command: ["python", "-m", "temporal.worker"]
          env:
            - name: PYTHONPATH
              value: /app/src
            # Set to the LAN IP of the machine running docker-compose temporal,
            # e.g. "192.168.1.x:7233". Update once Temporal moves into k3s.
            - name: TEMPORAL_HOST
              value: "192.168.1.x:7233"
            - name: KAGGLE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: aipet-secrets
                  key: kaggle-username
                  optional: true
            - name: KAGGLE_KEY
              valueFrom:
                secretKeyRef:
                  name: aipet-secrets
                  key: kaggle-key
                  optional: true
            - name: REMOTE_HOST
              valueFrom:
                secretKeyRef:
                  name: aipet-secrets
                  key: remote-host
                  optional: true
            - name: REMOTE_USER
              valueFrom:
                secretKeyRef:
                  name: aipet-secrets
                  key: remote-user
                  optional: true
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
