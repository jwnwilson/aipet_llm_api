# Copy to aipet-db.secret.yaml (gitignored) and replace CHANGE_ME before deploying locally.
# In CI, this secret is synced from GitHub Actions secrets by deploy.yml.
# Apply locally with: kubectl apply -f infra/k8s/aipet-llm/aipet-db.secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: aipet-db-secret
type: Opaque
stringData:
  postgres-user: "aipet"
  postgres-password: "CHANGE_ME"
  postgres-db: "aipet"
  database-url: "postgresql+psycopg2://aipet:CHANGE_ME@aipet-db:5432/aipet"
