apiVersion: apps/v1
kind: Deployment
metadata:
  name: aipet-llm
  labels:
    app: aipet-llm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aipet-llm
  template:
    metadata:
      labels:
        app: aipet-llm
    spec:
      imagePullSecrets:
        - name: ecr-credentials
      containers:
        - name: aipet-llm
          # Replace with output of: terraform -chdir=infra/terraform output -raw repository_url
          image: <ECR_REPOSITORY_URL>:latest
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_PATH
              value: /app/models/aipet.gguf
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: aipet-secrets
                  key: aws-s3-bucket
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aipet-secrets
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aipet-secrets
                  key: aws-secret-access-key
            - name: CORS_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: aipet-secrets
                  key: cors-origins
            - name: AUTH0_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: aipet-secrets
                  key: auth0-domain
            - name: AUTH0_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: aipet-secrets
                  key: auth0-audience
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
