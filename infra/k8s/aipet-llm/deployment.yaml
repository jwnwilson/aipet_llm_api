apiVersion: apps/v1
kind: Deployment
metadata:
  name: aipet-llm
  labels:
    app: aipet-llm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aipet-llm
  template:
    metadata:
      labels:
        app: aipet-llm
    spec:
      imagePullSecrets:
        - name: ecr-credentials
      containers:
        - name: aipet-llm
          # Replace with output of: terraform -chdir=infra/terraform output -raw repository_url
          image: <ECR_REPOSITORY_URL>:latest
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_PATH
              value: /app/models/aipet.gguf
            - name: MODEL_S3_KEY
              value: models/test_aipet.gguf.gz
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: aipet-llm-secrets
                  key: aws-s3-bucket
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aipet-llm-secrets
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aipet-llm-secrets
                  key: aws-secret-access-key
            - name: CORS_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: aipet-llm-secrets
                  key: cors-origins
            - name: AUTH0_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: aipet-llm-secrets
                  key: auth0-domain
            - name: AUTH0_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: aipet-llm-secrets
                  key: auth0-audience
            - name: AUTH0_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: aipet-llm-secrets
                  key: auth0-client-id
            - name: AUTH0_MGMT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: aipet-llm-secrets
                  key: auth0-mgmt-client-id
            - name: AUTH0_MGMT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aipet-llm-secrets
                  key: auth0-mgmt-client-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aipet-db-secret
                  key: database-url
            - name: TEMPORAL_HOST
              value: temporal:7233
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
