apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aipet-llm
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt"
    # Rate limiting: max 10 req/s per IP, max 5 concurrent connections
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "5"
    # Whitelist the internal health-check source so it is never rate-limited
    nginx.ingress.kubernetes.io/limit-whitelist: "10.42.3.1/32"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - aipet-llm-api.jwnwilson.co.uk
      secretName: aipet-llm-tls
  rules:
    - host: "aipet-llm-api.jwnwilson.co.uk"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aipet-llm
                port:
                  number: 80
