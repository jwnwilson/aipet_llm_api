apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aipet-llm
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    # Replace with the public hostname of your inlets exit node or VPS.
    # To accept any hostname (e.g. bare IP access), remove the `host:` line entirely.
    - host: "your-vps-hostname-or-domain.example.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aipet-llm
                port:
                  number: 80
