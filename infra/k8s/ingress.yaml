apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aipet-llm
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - aipet-llm-api.jwnwilson.co.uk
      secretName: aipet-llm-tls
  rules:
    - host: "aipet-llm-api.jwnwilson.co.uk"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aipet-llm
                port:
                  number: 80
