apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aipet-llm
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    # Replace with the public hostname or IP of your inlets VPS.
    # To match all requests regardless of host (e.g. bare IP), remove the host: line.
    - host: "your-vps-hostname-or-domain.example.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aipet-llm
                port:
                  number: 80
