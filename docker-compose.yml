services:
  aipet:
    build:
      context: .
      platforms:
        - linux/arm64
    image: aipet-llm:latest
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /app/models/aipet.gguf
    volumes:
      # Mount models/ so the GGUF can be swapped without rebuilding the image
      - ./models:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  temporal:
    image: temporalio/auto-setup:1.24
    ports:
      - "7233:7233"   # gRPC API
      - "8233:8233"   # Web UI
    environment:
      - DB=sqlite
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "temporal:7233"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  temporal-worker:
    build:
      context: .
    image: aipet-llm:latest
    command: python -m src.temporal.worker
    environment:
      TEMPORAL_HOST: temporal:7233
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped
